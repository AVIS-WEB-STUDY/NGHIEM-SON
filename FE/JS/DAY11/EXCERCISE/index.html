<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Product List</title>

        <script src="https://cdn.tailwindcss.com"></script>
    </head>
    <body class="bg-gray-100">
        <div class="p-4">
            <!-- Search -->
            <div class="flex flex-wrap gap-2 items-center mb-6">
                <input
                    type="text"
                    placeholder="search title..."
                    class="w-52 border border-gray-400 px-2 py-1 bg-white"
                />

                <button
                    class="border border-gray-500 px-4 py-1 bg-gray-200 hover:bg-gray-300"
                >
                    Search
                </button>

                <select
                    class="border border-gray-400 px-2 py-1 bg-white min-w-[160px]"
                >
                    <option>Mặc định</option>
                    <option>Price Asc</option>
                    <option>Price Desc</option>
                    <option>Sort A-Z</option>
                    <option>Sort Z-A</option>
                </select>
            </div>

            <!-- Total -->
            <div class="text-gray-700 font-semibold">
                Total: <span id="totalCount">0</span>
            </div>

            <div class="bg-white border border-gray-300">
                <!-- Table Scroll Area -->
                <div class="max-h-[70vh] overflow-y-auto">
                    <table class="w-full table-fixed">
                        <thead class="sticky top-0 bg-white z-10">
                            <tr>
                                <th
                                    class="border border-gray-300 text-left px-3 py-3"
                                >
                                    Title
                                </th>
                                <th
                                    class="border border-gray-300 text-left px-3 py-3 w-44"
                                >
                                    Price
                                </th>
                                <th
                                    class="border border-gray-300 text-left px-3 py-3 w-44"
                                >
                                    Category
                                </th>
                                <th
                                    class="border border-gray-300 text-left px-3 py-3 w-72  "
                                >
                                    Avatar
                                </th>
                                <th
                                    class="border border-gray-300 text-left px-3 py-3 w-24"
                                >
                                    Detail
                                </th>
                            </tr>
                        </thead>

                        <tbody
                            id="productList"
                            class="[&>tr:nth-child(even)]:bg-gray-200 [&>tr:nth-child(odd)]:bg-gray-100"
                        ></tbody>
                    </table>
                </div>
            </div>

            <!-- Pagination -->
            <div id="pagination" class="flex flex-wrap gap-1"></div>
        </div>
        <script src="main.js"></script>
    </body>
</html>
