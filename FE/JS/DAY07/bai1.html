<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Form Thông Tin</title>
<style>
    body{
        font-family: "Times New Roman", serif;
        margin: 10px;
    }

    .container{
        width: 320px;
    }

    input[type="text"]{
        width: 300px;
        height: 28px;
        font-size: 18px;
        padding-left: 5px;
        margin-bottom: 5px;
    }

    select{
        width: 165px;
        height: 32px;
        font-size: 18px;
        margin-bottom: 8px;
    }

    .gender{
        margin-bottom: 8px;
        font-size: 18px;
    }

    .gender label{
        margin-right: 10px;
    }

    button{
        font-size: 18px;
        padding: 3px 12px;
    }
</style>
</head>
<body>

<div class="container">
    <input type="text" id="valUserName" placeholder="User Name">

    <br>

    <select id="valCity">
        <option value="Hà Nội">Hà Nội</option>
        <option value="Đà Nẵng">Đà Nẵng</option>
        <option value="TP Hồ Chí Minh">TP Hồ Chí Minh</option>
    </select>

    <div class="gender">
        <label>
            <input type="radio" name="gender" value="Nam">
            Nam
        </label>

        <label>
            <input type="radio" name="gender" value="Nữ">
            Nữ
        </label>
    </div>
   

    <button onclick="handleSubmit()">Hiển thị</button>
    <div id="display"></div>
</div>
<script src="bai1.js"></script>
</body>
</html>
