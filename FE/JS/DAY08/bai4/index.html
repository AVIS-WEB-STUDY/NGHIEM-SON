<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Todo App</title>

        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        />

        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                font-family: Arial, sans-serif;
            }

            body {
                background: #f4f4f4;
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
            }

            .container {
                width: 800px;
                min-height: 700px;
                background: linear-gradient(180deg, #5d84df, #6f8fe3);
                border-radius: 25px;
                padding: 30px;
                color: #fff;
            }

            h1 {
                font-size: 48px;
                margin-bottom: 20px;
                font-family: Georgia, serif;
            }

            .form-group {
                display: flex;
                gap: 10px;
                margin-bottom: 20px;
            }

            input {
                flex: 1;
                padding: 12px;
                border: none;
                border-radius: 6px;
                font-size: 18px;
            }

            select {
                width: 150px;
                padding: 12px;
                border: none;
                border-radius: 6px;
                font-size: 18px;
            }

            .status {
                margin: 15px 0 25px;
                display: flex;
                gap: 15px;
                align-items: center;
                flex-wrap: wrap;
            }

            .status label {
                display: flex;
                align-items: center;
                gap: 6px;
            }

            .actions {
                display: flex;
                gap: 20px;
                margin-bottom: 30px;
            }

            .btn {
                border: none;
                color: #fff;
                padding: 12px 40px;
                border-radius: 12px;
                font-size: 18px;
                cursor: pointer;
            }

            .btn-add {
                background: #ff7b00;
            }

            .btn-clear {
                background: linear-gradient(90deg, #44d3e6, #1488cc);
            }

            .task {
                display: flex;
                align-items: center;
                justify-content: space-between;
                border: 1px solid rgba(255, 255, 255, 0.4);
                border-radius: 12px;
                padding: 20px;
                margin-bottom: 25px;
            }

            .task-name {
                font-size: 28px;
                color: #e7e7e7;
            }

            .task-right {
                display: flex;
                align-items: center;
                gap: 20px;
            }

            .badge {
                min-width: 130px;
                text-align: center;
                color: #fff;
                padding: 10px 25px;
                border-radius: 8px;
                font-weight: bold;
                font-size: 24px;
            }

            .todo {
                background: #c400a7;
            }

            .done {
                background: #ffd500;
                color: #fff;
            }

            .icon-btn {
                width: 40px;
                height: 40px;
                border: 1px solid #ddd;
                background: #fff;
                cursor: pointer;
                border-radius: 4px;
            }

            .icon-btn i {
                font-size: 18px;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h1>Thêm Công Việc</h1>

            <div class="form-group">
                <input id="valTitle" type="text" placeholder="Thêm Công việc" />
                <select id="filterTodo">
                    <option value="all">All</option>
                    <option value="Todo">Todo</option>
                    <option value="Done">Done</option>
                    <option value="Doing">Doing</option>
                    <option value="Resolved">Resolved</option>
                    <option value="Reopen">Reopen</option>
                </select>
            </div>

            <div class="status">
                <span>status:</span>

                <label
                    ><input type="radio" name="st" value="Todo" /> Todo</label
                >
                <label
                    ><input type="radio" name="st" value="Done" /> Done</label
                >
                <label
                    ><input type="radio" name="st" value="Doing" /> Doing</label
                >
                <label
                    ><input type="radio" name="st" value="Resolved" />
                    Resolved</label
                >
                <label
                    ><input type="radio" name="st" value="Reopen" />
                    Reopen</label
                >
            </div>

            <div class="actions">
                <button
                    id="btnSubmit"
                    class="btn btn-add"
                    onclick="handleSubmit()"
                >
                    Thêm
                </button>
                <button class="btn btn-clear">Clear</button>
            </div>

            <div id="display"></div>
        </div>
        <script src="main.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    </body>
</html>
