<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table {
            font-family: arial, sans-serif;
            border-collapse: collapse;
            width: 100%;
        }

        td,
        th {
            border: 1px solid #dddddd;
            text-align: left;
            padding: 8px;
        }

        tr:nth-child(even) {
            background-color: #dddddd;
        }

        .cart {
            max-width: 800px;
            margin: 30px auto;
            padding: 20px;
            background: #f8f8f8;
            border-radius: 10px;
        }

        .cart h2 {
            margin-bottom: 20px;
        }

        .cart-item {
            display: flex;
            gap: 16px;
            background: white;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .cart-item img {
            width: 120px;
            height: 120px;
            object-fit: contain;
            border-radius: 8px;
            background: #fafafa;
        }

        .info {
            flex: 1;
        }

        .info h3 {
            margin-bottom: 8px;
        }

        .info p {
            margin: 4px 0;
        }

        .discount {
            color: #0b9d58;
            font-weight: 600;
        }

        .summary {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 2px solid #ddd;
            text-align: right;
            font-size: 22px;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div id="showDetailCart"></div>
    <h1 id="total"></h1>
    <table>
        <thead>
            <tr>
                <th>Id</th>
                <th>Total Products</th>
                <th>Discounted Total</th>
                <th>Total Quantity</th>
                <th>Total</th>
                <th>Detail</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
    <script src="carts.js"></script>
</body>

</html>
